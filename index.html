<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>A4 拼貼重建 v1.1</title>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <h1>A4 拼貼重建 v1.1</h1>
        <p>自訂拖曳引擎版</p>
      </div>
      <div class="save-status"><span id="saveDot" class="dot idle"></span><span id="saveText">尚未存檔</span></div>
    </header>

    <main class="layout">
      <section class="panel controls" id="controlsSection">
        <div class="section-title">設定</div>

        <label class="field">
          <span>圖片</span>
          <input id="imageInput" type="file" accept="image/*" multiple />
        </label>

        <div class="field two-up">
          <label>
            <span>版型</span>
            <select id="layoutMode">
              <option value="1">1 欄</option>
              <option value="2">2 欄</option>
              <option value="3" selected>3 欄</option>
              <option value="special_2_1">上 2 下 1</option>
            </select>
          </label>
          <label>
            <span>檔名</span>
            <input id="filenameInput" type="text" />
          </label>
        </div>

        <div class="field slider-wrap">
          <label for="rowGap">上下間距 <strong id="rowGapValue">16 px</strong></label>
          <input id="rowGap" type="range" min="0" max="48" step="1" value="12" />
        </div>

        <div class="field slider-wrap">
          <label for="colGap">左右欄距 <strong id="colGapValue">20 px</strong></label>
          <input id="colGap" type="range" min="0" max="56" step="1" value="14" />
        </div>

        <div class="field two-up">
          <label>
            <span>外圍背景</span>
            <input id="outerBg" type="color" value="#f8fafc" />
          </label>
          <label>
            <span>卡紙底色</span>
            <input id="innerBg" type="color" value="#ffffff" />
          </label>
        </div>

        <div class="field">
          <span>常用色</span>
          <div id="palette" class="palette"></div>
        </div>

        <div class="actions">
          <button id="downloadBtn" class="primary"><i class="fa-solid fa-download"></i> 下載 PNG</button>
          <button id="resetBtn" class="danger"><i class="fa-solid fa-trash"></i> 重設全部</button>
        </div>
      </section>

      <section class="panel board-panel" id="boardSection">
        <div class="section-title">拖曳佈局看板</div>
        <div class="board-help">按住卡片主體拖曳。v1.1 已改成跟手指移動的自訂拖曳引擎。</div>
        <div id="board" class="board"></div>
      </section>

      <section class="panel preview-panel" id="previewSection">
        <div class="section-title">A4 預覽</div>
        <div class="preview-wrap">
          <canvas id="previewCanvas" width="2480" height="3508"></canvas>
        </div>
      </section>
    </main>
  </div>

  <div id="dragLayer" class="drag-layer"></div>
  <script src="./app.js"></script>
</body>
</html>
